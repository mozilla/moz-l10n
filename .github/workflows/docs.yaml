name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions the deploy needs: read the repo, write to Pages, and mint the
# OIDC token that deploy-pages uses to authenticate.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; a newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Python toolchain (pydoc-markdown + zensical are dev deps in pyproject).
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --dev --all-packages --all-extras

      # Node toolchain (typedoc + plugin are devDependencies).
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci

      # Generates Python + JS Markdown, then builds the static site to
      # api-docs/site.
      - run: npm run docgen

      - uses: actions/upload-pages-artifact@v3
        with:
          path: api-docs/site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
